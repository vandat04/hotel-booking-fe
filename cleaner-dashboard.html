<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaner Dashboard | Grand Hotel</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981; /* Emerald Green */
            --primary-dark: #059669;
            --secondary: #3b82f6; /* Sapphire Blue */
            --bg-body: #f8fafc;
            --bg-sidebar: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.7);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--bg-sidebar); color: var(--white); display: flex; flex-direction: column; transition: 0.3s; position: sticky; top: 0; height: 100vh; }
        .sidebar-brand { padding: 30px; font-size: 24px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { list-style: none; padding: 10px; flex: 1; }
        .sidebar-menu li { padding: 15px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-bottom: 5px; transition: 0.3s; color: #94a3b8; }
        .sidebar-menu li i { font-size: 18px; width: 25px; text-align: center; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: rgba(255, 255, 255, 0.1); color: var(--white); }
        .sidebar-menu li.active { background: var(--primary); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-logout { background: transparent; border: 1px solid rgba(255, 255, 255, 0.2); color: #94a3b8; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background: var(--danger); color: white; border-color: var(--danger); }

        /* MAIN CONTENT */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; justify-content: center; align-items: center; font-weight: 700; }

        /* METRICS */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 10px; position: relative; overflow: hidden; }
        .metric-card .icon { position: absolute; right: -10px; bottom: -10px; font-size: 60px; opacity: 0.05; color: var(--primary); }
        .metric-card .title { color: var(--text-muted); font-size: 14px; font-weight: 500; text-transform: uppercase; }
        .metric-card .value { font-size: 28px; font-weight: 700; }
        .c-pending { border-bottom: 4px solid var(--warning); }
        .c-doing { border-bottom: 4px solid var(--secondary); }
        .c-done { border-bottom: 4px solid var(--success); }

        /* TAB CONTENT */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TABLE & LIST */
        .room-box { background: var(--white); border-radius: 20px; box-shadow: var(--shadow); padding: 25px; margin-bottom: 20px; }
        .room-box h3 { margin-bottom: 20px; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .badge { padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .bg-pending { background: #fef3c7; color: #92400e; }
        .bg-doing { background: #dbeafe; color: #1e40af; }
        .bg-done { background: #dcfce7; color: #166534; }

        /* BUTTONS */
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1.5px solid #e2e8f0; color: var(--text-main); }
        .btn-outline:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }

        /* LOADER */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* TOAST */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 10000; }
        .toast { background: white; padding: 16px 24px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-top: 10px; min-width: 320px; display: flex; align-items: center; gap: 15px; border-left: 6px solid var(--primary); transform: translateX(120%); transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .close-modal { cursor: pointer; color: var(--text-muted); font-size: 20px; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <div id="toast-container"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <i class="fa fa-broom"></i> Cleaner Hub
        </div>
        <ul class="sidebar-menu">
            <li class="active" onclick="switchTab('overview', this)">
                <i class="fa fa-th-large"></i> Tổng quan
            </li>
            <li onclick="switchTab('tasks', this)">
                <i class="fa fa-tasks"></i> Công việc của tôi
            </li>
            <li onclick="window.location.href='attendance.html'">
                <i class="fa fa-clock"></i> Chấm công
            </li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()">
                <i class="fa fa-sign-out-alt"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header class="header">
            <h1 id="tabTitle">Tổng quan</h1>
            <div class="user-info">
                <span id="userName" style="font-weight: 600;">Cleaner</span>
                <div class="user-avatar" id="userInitial">C</div>
            </div>
        </header>

        <!-- TAB: OVERVIEW -->
        <div id="tab-overview" class="tab-content active">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="title">Tổng công việc</div>
                    <div class="value" id="valTotal">0</div>
                    <i class="fa fa-tasks icon"></i>
                </div>
                <div class="metric-card c-pending">
                    <div class="title">Hôm nay</div>
                    <div class="value" id="valToday">0</div>
                    <i class="fa fa-calendar-day icon"></i>
                </div>
                <div class="metric-card c-doing">
                    <div class="title">Đang làm</div>
                    <div class="value" id="valDoing">0</div>
                    <i class="fa fa-spinner icon"></i>
                </div>
                <div class="metric-card c-done">
                    <div class="title">Hoàn thành</div>
                    <div class="value" id="valDone">0</div>
                    <i class="fa fa-check-circle icon"></i>
                </div>
            </div>

            <div class="room-box">
                <h3><i class="fa fa-clipboard-list"></i> Việc gấp cần làm</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Phòng</th>
                            <th>Thời gian tạo</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="urgentTasksBody">
                        <tr><td colspan="4" style="text-align:center;">Vui lòng đợi...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB: TASKS -->
        <div id="tab-tasks" class="tab-content">
            <div class="room-box" style="margin-bottom: 20px;">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <span style="font-weight:600;"><i class="fa fa-filter"></i> Lọc:</span>
                    <button class="btn btn-outline active" onclick="filterTasks('', this)">Tất cả</button>
                    <button class="btn btn-outline" onclick="filterTasks('DOING', this)">Đang làm</button>
                    <button class="btn btn-outline" onclick="filterTasks('DONE', this)">Đã xong</button>
                </div>
            </div>

            <div class="room-box">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Phòng</th>
                            <th>Ngày tạo</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="allTasksBody">
                        <!-- Dynamic -->
                    </tbody>
                </table>
                <div id="pagination" style="margin-top:20px; display:flex; gap:10px; justify-content: center;"></div>
            </div>
        </div>
    </main>

    <!-- MODAL: TASK DETAIL -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Chi tiết Công việc</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody">
                <!-- Dynamic Content -->
            </div>
            <div style="margin-top: 25px; display: flex; gap: 10px;">
                <button class="btn btn-primary" id="btnComplete" style="flex:1;">
                    <i class="fa fa-check"></i> Hoàn thành ngay
                </button>
                <button class="btn btn-outline" onclick="closeModal()" style="flex:1;">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8080";
        let currentStatusFilter = "";
        let currentPage = 0;

        // --- AUTH & INIT ---
        function checkAuth() {
            const role = localStorage.getItem("checkinXRole");
            if (role !== "CLEANER") {
                alert("Bạn không có quyền Truy cập!");
                window.location.href = "login.html";
            }
            const name = localStorage.getItem("checkinXUser");
            if (name) {
                document.getElementById('userName').innerText = name;
                document.getElementById('userInitial').innerText = name.charAt(0).toUpperCase();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        async function fetchAPI(url, options = {}) {
            const token = localStorage.getItem("checkinXToken");
            const headers = { 
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json',
                ...options.headers 
            };
            
            try {
                const res = await fetch(API_BASE + url, { ...options, headers });
                
                if (res.status === 401) {
                    showToast("Phiên làm việc hết hạn", "warning");
                    logout();
                    return null;
                }
                
                if (res.status === 403) {
                    showToast("Bạn không có quyền thực hiện thao tác này.", "error");
                    return null;
                }

                if (!res.ok) {
                    const error = await res.text();
                    showToast(error || "Lỗi hệ thống", "error");
                    return null;
                }

                const contentType = res.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    return await res.json();
                } else {
                    return await res.text();
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                showToast("Lỗi xử lý dữ liệu hoặc kết nối", "error");
                return null;
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', warning: 'fa-exclamation-triangle' };
            toast.innerHTML = `<i class="fa ${icons[type]}"></i><div>${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // --- NAVIGATION ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('tabTitle').innerText = tabId === 'overview' ? 'Tổng quan' : 'Công việc của tôi';
            
            if (tabId === 'overview') loadOverview();
            else loadTasks();
        }

        // --- OVERVIEW LOGIC ---
        async function loadOverview() {
            document.getElementById('loader').style.display = 'flex';
            const dash = await fetchAPI('/cleaner/dashboard');
            if (dash) {
                document.getElementById('valTotal').innerText = dash.totalTasks;
                document.getElementById('valToday').innerText = dash.todayTasks;
                document.getElementById('valDoing').innerText = dash.inProgressTasks;
                document.getElementById('valDone').innerText = dash.doneTasks;
            }

            const tasksPage = await fetchAPI('/cleaner/tasks?status=DOING&size=5');
            if (tasksPage) {
                const body = document.getElementById('urgentTasksBody');
                if (!tasksPage.content || tasksPage.content.length === 0) {
                    body.innerHTML = '<tr><td colspan="4" style="text-align:center;">Tuyệt vời! Không có việc gấp nào.</td></tr>';
                } else {
                    body.innerHTML = tasksPage.content.map(t => `
                        <tr>
                            <td><b>Phòng ${t.roomId}</b></td>
                            <td>${new Date(t.createdAt).toLocaleTimeString()}</td>
                            <td><span class="badge bg-doing">Đang làm</span></td>
                            <td><button class="btn btn-primary" onclick="completeTask(${t.id})">Hoàn thành</button></td>
                        </tr>
                    `).join('');
                }
            }
            document.getElementById('loader').style.display = 'none';
        }

        // --- TASKS LOGIC ---
        function filterTasks(status, btn) {
            currentStatusFilter = status;
            const buttons = btn.parentElement.querySelectorAll('.btn-outline');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadTasks(0);
        }

        async function loadTasks(page = 0) {
            currentPage = page;
            document.getElementById('loader').style.display = 'flex';
            let url = `/cleaner/tasks?page=${page}&size=10`;
            if (currentStatusFilter) url += `&status=${currentStatusFilter}`;
            
            const data = await fetchAPI(url);
            if (data) {
                const body = document.getElementById('allTasksBody');
                body.innerHTML = data.content.map(t => `
                    <tr>
                        <td>#${t.id}</td>
                        <td><b>Phòng ${t.roomId}</b></td>
                        <td>${new Date(t.createdAt).toLocaleDateString()}</td>
                        <td><span class="badge bg-${t.status.toLowerCase()}">${t.status}</span></td>
                        <td>
                            <button class="btn btn-outline" style="padding: 5px 12px; font-size: 13px;" onclick="viewTask(${t.id})">
                                <i class="fa fa-info-circle"></i> Chi tiết
                            </button>
                        </td>
                    </tr>
                `).join('');
                renderPagination(data);
            }
            document.getElementById('loader').style.display = 'none';
        }

        async function viewTask(id) {
            document.getElementById('loader').style.display = 'flex';
            const t = await fetchAPI(`/cleaner/tasks/${id}`);
            document.getElementById('loader').style.display = 'none';

            if (t) {
                let html = `
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <p><b>Mã công việc:</b> #${t.id}</p>
                        <p><b>Trạng thái:</b> <span class="badge bg-${t.status.toLowerCase()}">${t.status}</span></p>
                        <p><b>Mã phòng:</b> ${t.roomId || 'N/A'}</p>
                        <p><b>Thời gian tạo:</b> ${new Date(t.createdAt).toLocaleString()}</p>
                        ${t.bookingId ? `
                            <hr style="margin: 10px 0; border: 0; border-top: 1px solid #eee;">
                            <p style="color:var(--secondary); font-weight:600;">Thông tin Booking liên quan:</p>
                            <p><b>Booking ID:</b> #${t.bookingId}</p>
                            <p><b>Loại:</b> ${t.bookingStatus || 'N/A'}</p>
                            <p><b>Nhận phòng:</b> ${new Date(t.checkIn).toLocaleDateString()}</p>
                            <p><b>Trả phòng:</b> ${new Date(t.checkOut).toLocaleDateString()}</p>
                        ` : ''}
                    </div>
                `;
                document.getElementById('modalBody').innerHTML = html;
                
                const btn = document.getElementById('btnComplete');
                if (t.status === 'DONE') {
                    btn.style.display = 'none';
                } else {
                    btn.style.display = 'flex';
                    btn.onclick = () => completeTask(t.id);
                }

                document.getElementById('taskModal').style.display = 'flex';
            }
        }

        async function completeTask(id) {
            if (!confirm("Xác nhận đã dọn dẹp xong phòng này?")) return;
            
            document.getElementById('loader').style.display = 'flex';
            const res = await fetchAPI(`/cleaner/tasks/${id}/complete`, { method: 'PUT' });
            document.getElementById('loader').style.display = 'none';
            
            if (res) {
                showToast("Đã hoàn thành công việc!");
                closeModal();
                if (document.getElementById('tab-overview').classList.contains('active')) loadOverview();
                else loadTasks(currentPage);
            }
        }

        function renderPagination(data) {
            const container = document.getElementById('pagination');
            let html = '';
            for (let i = 0; i < data.totalPages; i++) {
                html += `<button class="btn btn-outline ${i === data.number ? 'active' : ''}" onclick="loadTasks(${i})" style="padding: 5px 12px;">${i + 1}</button>`;
            }
            container.innerHTML = html;
        }

        function closeModal() {
            document.getElementById('taskModal').style.display = 'none';
        }

        // --- START ---
        checkAuth();
        loadOverview();
    </script>
</body>
</html>
