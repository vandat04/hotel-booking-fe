<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CheckinX</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7fbff;
            --white: #ffffff;
            --primary: #177dff;
            --primary-dark: #0d62d5;
            --text: #1c2b4f;
            --muted: #6f7e9a;
            --danger: #e63757;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .page { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr; padding: 40px 16px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 24px; color: var(--primary); }
        .brand svg { width: 28px; height: 28px; }
        .login-action { font-weight: 600; color: var(--primary); cursor: pointer; text-decoration: none; }
        .card { background: var(--white); border-radius: 20px; box-shadow: 0 15px 35px rgba(6, 33, 75, 0.12); overflow: hidden; }
        .card-inner { padding: 32px 28px; }
        h1 { font-size: 32px; margin-bottom: 10px; }
        .subtitle { color: var(--muted); margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { font-weight: 600; margin-bottom: 8px; display: block; }
        .form-control { width: 100%; border-radius: 12px; border: 1px solid #d9e4f7; background: #fafcff; padding: 12px 14px; font-size: 15px; color: #1c2b4f; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(23,125,255,0.16); }
        .btn { width: 100%; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 16px; font-weight: 600; padding: 12px; cursor: pointer; transition: transform .2s ease, background .2s ease; }
        .btn:hover { transform: translateY(-1px); background: var(--primary-dark); }
        .msg { margin-top: 12px; font-size: 14px; height: 20px; color: var(--danger); }
        .helper { font-size: 13px; color: var(--muted); margin-top: 14px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <a class="brand" href="home.html">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3h18v18H3V3z" fill="#177dff" fill-opacity="0.08"/><path d="M7 20V4h10v16" stroke="#177dff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11h10" stroke="#177dff" stroke-width="2" stroke-linecap="round"/><path d="M7 17h10" stroke="#177dff" stroke-width="2" stroke-linecap="round"/></svg>
                CheckinX
            </a>
            <a id="btnLoginStatus" class="login-action">Đăng nhập</a>
        </div>

        <div class="card">
            <div class="card-inner">
                <h1>Chào mừng khách hàng</h1>
                <p class="subtitle">Vui lòng đăng nhập để tiếp tục sử dụng dịch vụ</p>

                <div class="form-group">
                    <label for="username">Email hoặc số điện thoại</label>
                    <input id="username" class="form-control" type="text" placeholder="example@gmail.com" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input id="password" class="form-control" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
                </div>

                <button class="btn" onclick="onLogin()">Đăng nhập</button>
                <div id="msg" class="msg"></div>
                <p class="helper">Chưa có tài khoản? <a href="register.html" style="color: var(--primary); text-decoration: none;">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>

<script>
function setLoggedInUser({ username, role, token }) {
    localStorage.setItem('checkinXUser', username);
    localStorage.setItem('checkinXRole', role);
    localStorage.setItem('checkinXToken', token || '');
}

function getRedirectByRole(role) {
    if (!role) return 'home.html';
    const r = role.toUpperCase();
    if (r === 'ADMIN') return 'admin-dashboard.html';
    if (r === 'RECEPTIONIST') return 'receptionist-dashboard.html';
    if (r === 'CLEANER') return 'cleaner-dashboard.html';
    return 'home.html';
}

function updateLoginStatus() {
    const user = localStorage.getItem('checkinXUser');
    const btn = document.getElementById('btnLoginStatus');
    if (user) {
        btn.innerText = user;
        btn.onclick = () => {
            const role = (localStorage.getItem('checkinXRole') || '').toUpperCase();
            window.location.href = getRedirectByRole(role);
        };
    } else {
        btn.innerText = 'Đăng nhập';
        btn.onclick = () => window.location.href = 'login.html';
    }
}

async function onLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('msg');

    msg.style.color = '#e63757';
    if (!username || !password) {
        msg.innerText = 'Vui lòng nhập đủ thông tin!';
        return;
    }

    try {
        const res = await fetch('http://localhost:8080/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
            const errText = await res.text();
            msg.innerText = errText || 'Tên đăng nhập hoặc mật khẩu không đúng!';
            return;
        }

        const tokenstr = await res.text();
        const token = tokenstr.replace(/["']/g, ""); // Dọn dẹp lỡ có dấu ngoặc
        
        let role = 'USER';
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join('')));
            
            role = payload.role || 'USER';
        } catch(e) {
            console.error("Lỗi giải mã JWT", e);
        }

        const name = username;

        setLoggedInUser({ username: name, role, token });

        msg.style.color = '#006f18';
        msg.innerText = 'Đăng nhập thành công! Đang chuyển hướng...';

        setTimeout(() => {
            window.location.href = getRedirectByRole(role);
        }, 500);

    } catch (err) {
        console.error(err);

        // Fallback khi backend không chạy: dùng tài khoản demo (vẫn giúp test giao diện)
        const fallbackPassword = '123456';
        if (password === fallbackPassword) {
            let role = 'USER';
            const normalized = username.trim().toLowerCase();
            if (normalized.includes('admin')) role = 'ADMIN';
            else if (normalized.includes('receptionist')) role = 'RECEPTIONIST';
            else if (normalized.includes('cleaner')) role = 'CLEANER';

            setLoggedInUser({ username, role, token: 'local-fallback-token' });
            msg.style.color = '#006f18';
            msg.innerText = 'Không thể kết nối server, đang sử dụng chế độ demo. Đăng nhập thành công! Chuyển hướng...';
            setTimeout(() => {
                window.location.href = getRedirectByRole(role);
            }, 300);
            return;
        }

        msg.innerText = 'Không thể kết nối máy chủ. Vui lòng thử lại.';
    }
}

window.onload = function () {
    updateLoginStatus();
};
</script>
</body>
</html>
