<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - CheckinX</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f4f8ff;
            color: #0f172a;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 32px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1d4ed8;
            text-decoration: none;
        }

        .navbar .nav-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .navbar .nav-right button {
            border: none;
            background: #1d4ed8;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .page {
            min-height: calc(100vh - 120px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .card {
            width: min(760px, 100%);
            background: white;
            border-radius: 20px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .hero {
            background: #1d72f9;
            color: white;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .hero h2 {
            margin: 0;
            font-size: 2rem;
        }

        .hero p {
            margin: 0;
            line-height: 1.5;
            opacity: .9;
        }

        .form-panel {
            padding: 32px;
        }

        .footer {
            background: #030b1b;
            color: #e2e8f0;
            padding: 40px 48px;
            margin-top: 20px;
            display: block;
            font-size: 0.95rem;
        }

        .footer .footer-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 32px;
            align-items: start;
        }

        .footer .footer-col {
            min-width: 180px;
        }

        .footer .footer-col h4 {
            margin: 0 0 8px;
            font-size: 1rem;
            color: #1e293b;
        }

        .footer .footer-col a {
            display: block;
            color: #334155;
            text-decoration: none;
            margin-bottom: 6px;
        }

        .footer .footer-bottom {
            width: 100%;
            text-align: center;
            padding-top: 16px;
            color: #64748b;
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            margin-top: 12px;
        }

        .form-panel h2 {
            margin: 0 0 18px;
            font-size: 1.6rem;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: .92rem;
            margin-bottom: 6px;
            color: #334155;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: .15s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .2);
        }

        .submit-row {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: #1d4ed8;
            color: white;
            flex: 1;
        }

        .btn-link {
            background: transparent;
            color: #1d4ed8;
            text-decoration: underline;
        }

        .message {
            margin-top: 12px;
            font-size: .95rem;
            min-height: 22px;
        }

        .message.success {
            color: #047857;
        }

        .message.error {
            color: #dc2626;
        }

/* FOOTER */
        .footer {
            background: #030b1b;
            color: #e2e8f0;
            padding: 40px 48px;
        }

        .footer-container {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:30px;
        }

        .footer-col h3 {
            color:white;
            margin-bottom:10px;
        }

        .footer-col a {
            display:block;
            color:#ccc;
            text-decoration:none;
            margin:5px 0;
        }

        .footer-col a:hover {
            color:#007bff;
        }

        .footer-bottom {
            text-align:center;
            margin-top:20px;
        }

        @media (max-width:820px) {
            .card {
                grid-template-columns: 1fr;
            }

            .hero {
                order: 2;
            }

            .form-panel {
                order: 1;
            }
        }
    </style>
</head>

<body>
    <header class="navbar">
        <a href="home.html" class="logo">CheckinX</a>
        <div class="nav-right">
            <button id="loginBtn">Đăng nhập</button>
        </div>
    </header>
    <div class="page">
        <div class="card">
            <div class="hero">
                <h2>Tham gia CheckinX</h2>
                <p>Đăng ký tài khoản khách hàng để trải nghiệm dịch vụ đặt phòng thông minh và thuận tiện.</p>
            </div>
            <div class="form-panel">
                <h2>Tạo tài khoản mới</h2>
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input id="username" type="text" placeholder="username" required />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="Email" required />
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input id="password" type="password" placeholder="password" required minlength="6" />
                </div>
                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <input id="fullName" type="text" placeholder="fullName" required />
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input id="phone" type="tel" placeholder="phone" pattern="[0-9]{9,12}" required />
                </div>
                <div class="submit-row">
                    <button class="btn btn-primary" id="registerBtn">Đăng ký tài khoản</button>
                    <button class="btn btn-link" id="gotoLogin">Đăng nhập</button>
                </div>
                <div id="msg" class="message"></div>
            </div>
        </div>
    </div>
    <script>
        const msgEl = document.getElementById('msg');
        const apiUrl = 'http://localhost:8080/auth/register';

        function showError(message) {
            msgEl.className = 'message error';
            msgEl.textContent = message;
        }

        function showSuccess(message) {
            msgEl.className = 'message success';
            msgEl.textContent = message;
        }

        if (window.location.protocol === 'file:') {
            showError('Vui lòng phục vụ trang HTML qua HTTP (ví dụ: Live Server) để tránh lỗi CORS/Network.');
        }

        document.getElementById('gotoLogin').addEventListener('click', () => {
            window.location.href = 'login.html';
        });

        document.getElementById('registerBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            msgEl.textContent = '';
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!username || !email || !password || !fullName || !phone) {
                showError('Vui lòng nhập đầy đủ thông tin đăng ký.');
                return;
            }

            const payload = { username, email, password, fullName, phone };
            msgEl.className = 'message';
            msgEl.textContent = 'Đang gửi yêu cầu đăng ký...';

            try {
                const resp = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                const contentType = (resp.headers.get('content-type') || '').toLowerCase();
                let bodyData = null;

                if (contentType.includes('application/json')) {
                    bodyData = await resp.json();
                } else {
                    bodyData = (await resp.text()).trim();
                }

                if (!resp.ok) {
                    const serverMsg = (bodyData && bodyData.message) ? bodyData.message : (typeof bodyData === 'string' ? bodyData : '');
                    throw new Error(serverMsg || `Đăng ký thất bại. Mã lỗi: ${resp.status}`);
                }

                const successMessage = (bodyData && bodyData.message) ? bodyData.message : (typeof bodyData === 'string' ? bodyData : 'Đăng ký thành công! Chuyển đến trang đăng nhập...');
                showSuccess(successMessage || 'Đăng ký thành công! Chuyển đến trang đăng nhập...');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 900);
            } catch (err) {
                console.error('Register fetch failed:', err);

                if (err.name === 'TypeError') {
                    showError('Không thể kết nối máy chủ. Kiểm tra server đã chạy và CORS đã bật (Access-Control-Allow-Origin).');
                } else {
                    showError(err.message || 'Xảy ra lỗi trong quá trình đăng ký.');
                }
            }
        });

        const loginBtn = document.getElementById('loginBtn');
        function updateLoginButton() {
            const username = localStorage.getItem('checkinXUser');
            if (username) {
                loginBtn.textContent = username;
            } else {
                loginBtn.textContent = 'Đăng nhập';
            }
        }

        loginBtn.addEventListener('click', () => {
            const username = localStorage.getItem('checkinXUser');
            if (username) {
                alert('Xin chào ' + username + '.');
            } else {
                window.location.href = 'login.html';
            }
        });

        updateLoginButton();
    </script>
    <footer class="footer">
    <div class="footer-container">
        <div class="footer-col">
            <h2 style="color:#007bff">CheckinX</h2>
            <p>Modern booking platform</p>
        </div>

        <div class="footer-col">
            <h3>Company</h3>
            <a href="#">About</a>
            <a href="#">Blog</a>
        </div>

        <div class="footer-col">
            <h3>Support</h3>
            <a href="#">Help</a>
            <a href="#">Privacy</a>
        </div>

        <div class="footer-col">
            <h3>Contact</h3>
            <p>📍 Vietnam</p>
            <p>📞 0123 456 789</p>
        </div>
    </div>

    <div class="footer-bottom">
        © 2026 CheckinX
        <br>
    </div>
</footer>
</body>

</html>
